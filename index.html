    <h1 class="main-header">NOTES APP</h1>

        <div class="forms-wrapper">
            <div class="form-wrapper">
                <h2 class="form-header">Create new note:</h2>
                <form class="note-form">
                    <label>
                        <!-- <span>Note title:</span> -->
                        <input class="input-item" type="text" name="noteTitle" placeholder="Title..." autofocus>
                    </label>
                    <label>
                        <!-- <span>Note content:</span> -->
                        <textarea class="input-item" name="noteContent" placeholder="Content..." rows="10"></textarea>
                    </label>
                    <button type="submit" class="add-note-btn btn" disabled>Add note</button>
                    <button type="reset" class="clear-note-btn btn">Clear</button>
                </form>
            </div>

            <div class="form-wrapper">
                <h2 class="form-header">Search notes by keyword:</h2>
                <form class="search-form">
                    <label>
                        <input class="search-item" type="text" name="searchByKeyword" placeholder="Search title or content...">
                    </label>
                    <button type="submit" class="search-btn btn">Search</button>
                    <button type="button" class="reset-filter-btn btn">Reset filter</button>
                </form>
            </div>
        </div>
