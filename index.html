<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/styles.css">
    <script defer src="./assets/index.js"></script>
</head>
<body>
    <main class="main-wrapper">
        <h1 class="main-header">NOTES APP</h1>
        <div class="forms-wrapper">
            <h2 class="note-form-header">Create new note</h2>
            <form class="note-form">
                <label>
                    <span>Note title:</span>
                    <input class="input-item" type="text" name="noteTitle" placeholder="Title" autofocus>
                </label>
                <label>
                    <span>Note content:</span>
                    <textarea class="input-item" name="noteContent" placeholder="Content"></textarea>
                </label>
                <button type="submit" class="add-note-btn" disabled>Add note</button>
                <button type="reset" class="clear-note-btn">Clear</button>
            </form>

            <br>
            <form class="search-form">
                <label>
                    <span>Search notes by keyword:</span>
                    <input class="search-item" type="text" name="searchByKeyword" placeholder="">
                </label>
                <button type="submit" class="search-btn">Search</button>
                <button type="button" class="reset-filter-btn">Reset filter</button>
            </form>
        </div>
