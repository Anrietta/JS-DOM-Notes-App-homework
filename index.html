<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="stylesheet" href="./styles/media.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="./assets/index.js"></script>
</head>
<body>
    <h1 class="main-header">NOTES APP</h1>
    <main class="main-wrapper">
        <div class="forms-wrapper">
            <div class="form-wrapper">
                <h2 class="form-header">Create new note:</h2>
                <form class="note-form">
                    <label>
                        <input class="input-item" type="text" name="noteTitle" placeholder="Title..." autofocus>
                    </label>
                    <label>
                        <textarea class="input-item" name="noteContent" placeholder="Content..."></textarea>
                    </label>
                    <button type="submit" class="add-note-btn btn" disabled>Add note</button>
                    <button type="reset" class="clear-note-btn btn">Clear</button>
                </form>
            </div>

            <div class="form-wrapper">
                <h2 class="form-header">Search notes:</h2>
                <form class="search-form">
                    <label>
                        <input class="search-item" type="text" name="searchByKeyword" placeholder="Search title or content...">
                    </label>
                    <button type="submit" class="search-btn btn">Search</button>
                    <button type="button" class="reset-filter-btn btn">Reset filter</button>
                </form>
            </div>
        </div>

        <ul class="notes-list">
        </ul>
    </main>
    
</body>
</html>
